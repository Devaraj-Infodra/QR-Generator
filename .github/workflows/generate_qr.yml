name: Generate QR Code

on:
  repository_dispatch:
    types: [generate-qr]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install qrcode[pil] twilio

      - name: Generate QR + Send SMS
        env:
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}
          TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
        run: python upload_qr.py '${{ toJson(github.event.client_payload) }}'


      - name: Commit and push QR image
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add qr-images/ results/
          git diff --staged --quiet || git commit -m "Add QR for ${{ github.event.client_payload.qr_name }}"
          git push origin main
